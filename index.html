        <h1>Bazzari — Online grocery delivery</h1>
        <p>
          Bazzari helps you order daily groceries from your phone or computer. Browse our
          product categories, search by item name, add products to your cart, and place an order
          for home delivery. You can pay online through a secure payment gateway or choose cash on
          delivery when that option is available in your area.
        </p>
        <h2>How to shop</h2>
        <p>
          Start on the shop page to see all categories, including fresh produce, pantry staples,
          and chilled beverages. Open any product to view its price and availability, then add
          what you need to your cart. When you are ready, go to the cart page, select a delivery
          address, choose your payment method, and confirm your order.
        </p>
        <h2>Account and support</h2>
        <p>
          Creating an account lets you save delivery addresses and view your order history. For
          help with orders or privacy questions, visit our contact and privacy pages on this
          site.
        </p>
