[build]
  command = "npm run build"
  publish = "dist"

# Proxy API (and auth) to backend so same-origin /api/* works on Netlify like Vite dev.
# Match DEFAULT_API_BASE_URL in src/constants/config.js if you change hosts.
[[redirects]]
  from = "/api/*"
  to = "https://grocery-app-env.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "https://grocery-app-env.up.railway.app/auth/:splat"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
